# INSTALL:
#   cp eco_lrtb.conf /etc/apache2/conf-available/
#   a2enconf eco_lrtb
#   apache2ctl configtest && systemctl reload apache2

<IfModule mod_mime.c>
    AddType application/eco+file            .FILE
    AddType text/x-nix                      .nix
    AddType text/css                        .css
    AddType application/javascript          .js .mjs .cjs
    AddType application/json                .json
    AddType text/xml                        .xml
    AddType application/xhtml+xml           .xhtml
    AddType text/markdown                   .md
    AddType text/plain                      .txt
    AddType application/x-php               .php
    AddType text/x-c                        .c .h
    AddType text/x-csharp                   .cs
    AddType text/x-python                   .py
</IfModule>

<IfModule mod_deflate.c>
    AddOutputFilterByType DEFLATE \
        text/css \
        text/plain \
        text/xml \
        text/markdown \
        application/javascript \
        application/json \
        application/eco+file
</IfModule>

<Directory "/var/www/html/eco_lrtb">
    Options -Indexes +FollowSymLinks
    AllowOverride None
    Require all granted

    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresByType application/javascript    "access plus 1 year"
        ExpiresByType text/css                  "access plus 1 year"
        ExpiresByType application/json          "access plus 1 hour"
        ExpiresByType text/xml                  "access plus 1 hour"
        ExpiresByType application/eco+file      "access plus 1 day"
        ExpiresByType text/plain                "access plus 1 week"
    </IfModule>

    <IfModule mod_headers.c>
        <FilesMatch "\.(css|js|mjs|json|xml|FILE)$">
            Header set Access-Control-Allow-Origin "*"
            Header set Access-Control-Allow-Methods "GET, OPTIONS"
            Header set Access-Control-Allow-Headers "Content-Type"
            Header set X-Eco-Version "1.0.0"
        </FilesMatch>
        Header set X-Content-Type-Options "nosniff"
        Header set X-Frame-Options "SAMEORIGIN"
    </IfModule>
</Directory>

Alias /eco_lrtb/ftp /var/www/html/eco_lrtb/ftp

<Directory "/var/www/html/eco_lrtb/ftp">
    Options -Indexes
    AllowOverride None
    Require all granted

    <IfModule mod_headers.c>
        Header set Content-Disposition "attachment"
        Header set Access-Control-Allow-Origin "*"
    </IfModule>
</Directory>

<IfModule mod_rewrite.c>
    RewriteEngine On
    RewriteRule ^/eco/([a-z]+)$ /eco_lrtb/ftp/eco_ftp_index.json?preset=$1 [QSA,L]
    RewriteRule \.FILE$ - [T=application/eco+file]
</IfModule>

CustomLog ${APACHE_LOG_DIR}/eco_lrtb_access.log combined
ErrorLog  ${APACHE_LOG_DIR}/eco_lrtb_error.log
LogLevel warn
