name: ATKMA Deno Compatibility Bridge

# ATKMA -- Adhere To Konwisdom Make Agreement
# Licensed under Toadstool Open Source Software License v1.0.0
# Copyright (C) 2026 Tyler Blankenship
#
# BRIDGE DESIGN:
# This workflow bears the packet weight of incompatible language constructs.
# It does not replace what is already running. It agrees between them.
#
# SPEED PRIORITY:
# Detection and exchange run in parallel lanes.
# cancel-in-progress: true so stale runs never block a fresh push.

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      target_runtime:
        description: 'Target: deno | node | bun'
        required: false
        default: 'deno'
      force_exchange:
        description: 'Force exchange even if no issues found'
        required: false
        default: 'false'

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: "atkma-transpile"
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ATKMA_TARGET: ${{ inputs.target_runtime || 'deno' }}
  ATKMA_BRANCH_PREFIX: "atkma-exchange"
  ATKMA_VERSION: "1.0.0"
  TOADSTOOL_LICENSE: "Toadstool Open Source Software License v1.0.0"

jobs:

  assess:
    name: ATKMA Bridge Assessment
    runs-on: ubuntu-latest
    outputs:
      needs_bridge: ${{ steps.assess.outputs.needs_bridge }}
      issue_count:  ${{ steps.assess.outputs.issue_count }}
      file_count:   ${{ steps.assess.outputs.file_count }}
      branch_name:  ${{ steps.assess.outputs.branch_name }}
      target:       ${{ steps.assess.outputs.target }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Assess bridge requirements
        id: assess
        run: |
          node << 'ASSESS'
          const fs   = require('fs');
          const path = require('path');

          const TARGET = process.env.ATKMA_TARGET || 'deno';

          const BRIDGE_PATTERNS = {
            deno: [
              {
                id:    'no_var',
                regex: /\bvar\s+/,
                fix:   'exchange_var',
                note:  'var not allowed in Deno strict mode',
              },
              {
                id:    'bare_catch_e',
                regex: /catch\s*\(\s*e\s*\)/,
                fix:   'exchange_catch_e',
                note:  'bare catch(e) requires typed parameter in Deno',
              },
            ],
            bun: [
              {
                id:    'no_var',
                regex: /\bvar\s+/,
                fix:   'exchange_var',
                note:  'var discouraged in Bun strict mode',
              },
            ],
          };

          const patterns = BRIDGE_PATTERNS[TARGET] || BRIDGE_PATTERNS['deno'];
          const issues   = [];

          function walk(dir, depth) {
            if (depth > 8 || !fs.existsSync(dir)) return;
            for (const f of fs.readdirSync(dir)) {
              if (f === '.git' || f === 'node_modules') continue;
              const full = path.join(dir, f);
              const stat = fs.statSync(full);
              if (stat.isDirectory()) {
                walk(full, depth + 1);
              } else if (f.endsWith('.js') || f.endsWith('.ts') || f.endsWith('.mjs')) {
                const rel = full.replace(/^\.\//, '');
                if (rel.includes('.atkma.out') || rel.startsWith('atkma/')) continue;
                const content = fs.readFileSync(full, 'utf8');
                const lines   = content.split('\n');
                for (const pattern of patterns) {
                  lines.forEach((line, idx) => {
                    if (pattern.regex.test(line)) {
                      issues.push({
                        file:       rel,
                        line:       idx + 1,
                        line_index: idx,
                        original:   line.trim(),
                        pattern_id: pattern.id,
                        fix:        pattern.fix,
                        note:       pattern.note,
                      });
                    }
                  });
                }
              }
            }
          }
          walk('.', 0);

          const by_file = {};
          for (const issue of issues) {
            if (!by_file[issue.file]) by_file[issue.file] = [];
            by_file[issue.file].push(issue);
          }

          const ts         = new Date().toISOString().slice(0,16).replace(/[T:]/g,'-');
          const branchName = "atkma-exchange-" + ts;
          const needsBridge = issues.length > 0 || process.env.INPUT_FORCE_EXCHANGE === 'true';

          fs.mkdirSync('atkma/exchanges', { recursive: true });
          fs.writeFileSync('atkma/exchanges/latest-scan.json',
            JSON.stringify({
              timestamp:   new Date().toISOString(),
              target:      TARGET,
              branchName,
              issues,
              by_file,
              issue_count: issues.length,
              file_count:  Object.keys(by_file).length,
            }, null, 2));

          const out = process.env.GITHUB_OUTPUT;
          fs.appendFileSync(out, "needs_bridge=" + (needsBridge ? 'true' : 'false') + "\n");
          fs.appendFileSync(out, "issue_count=" + issues.length + "\n");
          fs.appendFileSync(out, "file_count=" + Object.keys(by_file).length + "\n");
          fs.appendFileSync(out, "branch_name=" + branchName + "\n");
          fs.appendFileSync(out, "target=" + TARGET + "\n");

          console.log("ATKMA Assessment -- Target: " + TARGET);
          console.log("Issues:  " + issues.length);
          console.log("Files:   " + Object.keys(by_file).length);
          console.log("Bridge:  " + (needsBridge ? "REQUIRED" : "NOT REQUIRED"));
          process.exit(0);
          ASSESS

  exchange:
    name: ATKMA Exchange Bridge
    runs-on: ubuntu-latest
    needs: assess
    if: needs.assess.outputs.needs_bridge == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.WORKFLOW_PAT }}

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Configure git identity
        run: |
          git config user.name  "atkma-bridge-bot"
          git config user.email "atkma-bridge@eco-lrtb-system"

      - name: Set PAT remote
        run: |
          git remote set-url origin \
            https://x-access-token:${{ secrets.WORKFLOW_PAT }}@github.com/${{ github.repository }}.git

      - name: Create exchange branch
        run: |
          BRANCH="${{ needs.assess.outputs.branch_name }}"
          git checkout -b "${BRANCH}"
          echo "ATKMA_BRANCH=${BRANCH}" >> $GITHUB_ENV

      - name: Run ATKMA exchange engine
        run: |
          node << 'EXCHANGE'
          const fs   = require('fs');
          const path = require('path');

          const HEADER =
            "// Licensed under Toadstool Open Source Software License v1.0.0\n" +
            "// Copyright (C) 2026 Tyler Blankenship\n" +
            "// Generated by ATKMA Bridge v1.0.0\n" +
            "// Original file is preserved unchanged.\n\n";

          const scan = JSON.parse(
            fs.readFileSync('atkma/exchanges/latest-scan.json', 'utf8')
          );

          function exchange_var(line, all_lines, idx) {
            const match = line.match(/\bvar\s+([a-zA-Z_$][a-zA-Z0-9_$]*)/);
            const name  = match ? match[1] : null;
            let   kw    = 'const';
            if (name) {
              const rest = all_lines.slice(idx + 1);
              if (rest.some(l => new RegExp('\\b' + name + '\\s*=(?!=)').test(l))) {
                kw = 'let';
              }
            }
            return {
              result: line.replace(/\bvar\b/, kw),
              note:   "var -> " + kw + " (ATKMA exchange_var)",
              agree:  true,
            };
          }

          function exchange_catch_e(line, all_lines, idx) {
            let depth = 0, started = false, uses_e = false;
            for (let i = idx; i < all_lines.length; i++) {
              if (all_lines[i].includes('{')) { depth++; started = true; }
              if (all_lines[i].includes('}')) {
                depth--;
                if (started && depth === 0) break;
              }
              if (started && i > idx && /\be\b/.test(all_lines[i])) uses_e = true;
            }
            if (!uses_e) {
              return {
                result: line.replace(/catch\s*\(\s*e\s*\)/, 'catch'),
                note:   "catch(e) unused -> catch (ATKMA exchange_catch_e_unused)",
                agree:  true,
              };
            }
            const indent = line.match(/^(\s*)/)[1];
            return {
              result:      line.replace(/catch\s*\(\s*e\s*\)/, 'catch(error: unknown)'),
              extra_after: indent + "  const _atkma_err = error instanceof Error ? error.message : String(error);",
              body_patch:  { find: /\be\.message\b/g, replace: '_atkma_err' },
              note:        "catch(e) used -> typed catch (ATKMA exchange_catch_e_used)",
              agree:       true,
            };
          }

          const FNS = { exchange_var, exchange_catch_e };

          const results = [];

          for (const [file_path, file_issues] of Object.entries(scan.by_file)) {
            if (!fs.existsSync(file_path)) continue;

            const lines  = fs.readFileSync(file_path, 'utf8').split('\n');
            const output = [...lines];
            const log    = [];

            const sorted = [...file_issues].sort((a, b) => b.line_index - a.line_index);

            for (const issue of sorted) {
              const idx = issue.line_index;
              const fn  = FNS[issue.fix];
              if (!fn) continue;
              const res = fn(output[idx], output, idx);
              if (!res.agree) continue;
              output[idx] = res.result;
              if (res.extra_after) output.splice(idx + 1, 0, res.extra_after);
              if (res.body_patch) {
                for (let i = idx + 1; i < output.length; i++) {
                  output[i] = output[i].replace(res.body_patch.find, res.body_patch.replace);
                }
              }
              log.push({
                line:     issue.line,
                pattern:  issue.pattern_id,
                original: issue.original,
                result:   res.result,
                note:     res.note,
              });
            }

            const ext      = path.extname(file_path);
            const base     = path.basename(file_path, ext);
            const dir      = path.dirname(file_path);
            const out_path = path.join(dir, base + '.atkma.out.ts');

            fs.writeFileSync(out_path,
              HEADER +
              "// Source    : " + file_path + "\n" +
              "// Target    : " + scan.target + "\n" +
              "// Exchanges : " + log.length + "\n\n" +
              output.join('\n')
            );

            const ts       = new Date().toISOString().replace(/[:.]/g, '-');
            const log_path = 'atkma/exchanges/' + ts + '-' + base + '.atkma';
            fs.writeFileSync(log_path, [
              "ATKMA v1.0.0",
              "TARGET      : " + scan.target,
              "SOURCE_FILE : " + file_path,
              "OUTPUT_FILE : " + out_path,
              "EXCHANGES   : " + log.length,
              "",
              ...log.flatMap(entry => [
                "-- EXCHANGE: " + entry.pattern + " line " + entry.line + " --",
                "ORIGINAL   : " + entry.original,
                "SUPPLEMENT : " + entry.result,
                "NOTE       : " + entry.note,
                "AGREE      : yes",
                "",
              ]),
            ].join('\n'));

            results.push({ source: file_path, output: out_path, exchanges: log.length });
            console.log("Bridged: " + file_path + " -> " + out_path);
          }

          fs.writeFileSync('atkma/ATKMA_REPORT.md', [
            "# ATKMA Bridge Report",
            "",
            "**Language:** ATKMA v1.0.0",
            "**License:** Toadstool Open Source Software License v1.0.0",
            "**Target:** " + scan.target,
            "**Timestamp:** " + scan.timestamp,
            "**Branch:** `" + scan.branchName + "`",
            "",
            "---",
            "",
            "## Summary",
            "",
            "| Metric | Value |",
            "|--------|-------|",
            "| Issues bridged  | " + scan.issue_count + " |",
            "| Files processed | " + results.length   + " |",
            "",
            "---",
            "",
            "## Files Bridged",
            "",
            ...results.map(r => "- `" + r.output + "` -- " + r.exchanges + " exchanges from `" + r.source + "`"),
            "",
            "---",
            "",
            "## Exchange Rules",
            "",
            "**var** -> const or let (scope analysis)",
            "**catch(e) used** -> catch(error: unknown) with typed helper const",
            "**catch(e) unused** -> catch { }",
            "",
            "---",
            "",
            "*ATKMA is the bridge. Original files are untouched.*",
          ].join('\n'));

          fs.writeFileSync('atkma/exchanges/exchange-results.json',
            JSON.stringify({ timestamp: new Date().toISOString(), results }, null, 2));

          console.log("\nBridge complete. " + results.length + " files processed.");
          process.exit(0);
          EXCHANGE

      - name: Commit bridge output
        run: |
          mkdir -p atkma/exchanges
          git add atkma/
          git add -A

          if ! git diff --staged --quiet; then
            git commit -m "atkma: bridge exchange for ${{ needs.assess.outputs.target }} compatibility

          ATKMA Bridge v1.0.0
          License: Toadstool Open Source Software License v1.0.0
          Target:  ${{ needs.assess.outputs.target }}
          Issues:  ${{ needs.assess.outputs.issue_count }}
          Files:   ${{ needs.assess.outputs.file_count }}

          var -> const or let
          catch(e) -> typed catch
          Original files preserved. Output files .atkma.out.ts"

            git pull --rebase origin main
            git push origin "${ATKMA_BRANCH}"
          else
            git push origin "${ATKMA_BRANCH}" || true
          fi

      - name: Open bridge pull request
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          github-token: ${{ secrets.WORKFLOW_PAT }}
          script: |
            const branch    = "${{ needs.assess.outputs.branch_name }}";
            const issues    = "${{ needs.assess.outputs.issue_count }}";
            const files     = "${{ needs.assess.outputs.file_count }}";
            const target    = "${{ needs.assess.outputs.target }}";
            const owner     = context.repo.owner;
            const repo      = context.repo.repo;
            const runId     = context.runId;
            const runUrl    = "https://github.com/" + owner + "/" + repo + "/actions/runs/" + runId;
            const reportUrl = "https://github.com/" + owner + "/" + repo + "/blob/" + branch + "/atkma/ATKMA_REPORT.md";

            let body  = "## ATKMA Bridge Pull Request\n\n";
            body += "**Language:** ATKMA v1.0.0\n";
            body += "**License:** Toadstool Open Source Software License v1.0.0\n";
            body += "**Target:** " + target + "\n";
            body += "**Run:** [View log](" + runUrl + ")\n";
            body += "**Report:** [ATKMA_REPORT.md](" + reportUrl + ")\n\n";
            body += "---\n\n";
            body += "### Bridge Summary\n\n";
            body += "| Metric | Value |\n|--------|-------|\n";
            body += "| Patterns bridged | " + issues + " |\n";
            body += "| Files processed  | " + files  + " |\n\n";
            body += "### What ATKMA bridged\n\n";
            body += "- var -> const or let (scope analysis)\n";
            body += "- catch(e) used -> catch(error: unknown) with helper\n";
            body += "- catch(e) unused -> catch { }\n\n";
            body += "### Original files\n\n";
            body += "All original .js files are completely untouched.\n";
            body += "Output files carry .atkma.out.ts suffix.\n";
            body += "This branch extends alongside main independently.\n";

            try {
              await github.rest.pulls.create({
                owner,
                repo,
                title: "atkma: bridge " + target + " compatibility -- " + new Date().toISOString().slice(0,10),
                head:  branch,
                base:  "main",
                body,
                draft:                 false,
                maintainer_can_modify: true,
              });
              console.log("Bridge PR created");
            } catch(prError) {
              console.log("PR already exists or could not be created: " + prError.message);
            }

  report:
    name: ATKMA Bridge Report
    runs-on: ubuntu-latest
    needs: [assess, exchange]
    if: always()
    continue-on-error: true

    steps:
      - name: Post bridge report comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const needs_bridge = "${{ needs.assess.outputs.needs_bridge }}";
            const issues       = "${{ needs.assess.outputs.issue_count }}";
            const files        = "${{ needs.assess.outputs.file_count }}";
            const branch       = "${{ needs.assess.outputs.branch_name }}";
            const target       = "${{ needs.assess.outputs.target }}";
            const owner        = context.repo.owner;
            const repo         = context.repo.repo;
            const runId        = context.runId;
            const sha          = context.sha;
            const runUrl       = "https://github.com/" + owner + "/" + repo + "/actions/runs/" + runId;
            const branchUrl    = "https://github.com/" + owner + "/" + repo + "/tree/" + branch;
            const reportUrl    = "https://github.com/" + owner + "/" + repo + "/blob/" + branch + "/atkma/ATKMA_REPORT.md";

            const status = needs_bridge === 'true' ? "bridge applied" : "no bridge required";

            let body  = "## ATKMA Bridge Report -- " + status + "\n\n";
            body += "**Language:** ATKMA v1.0.0\n";
            body += "**License:** Toadstool Open Source Software License v1.0.0\n";
            body += "**Target:** " + target + "\n";
            body += "**Run:** [View log](" + runUrl + ")\n\n";
            body += "| Metric | Value |\n|--------|-------|\n";
            body += "| Patterns found   | " + issues + " |\n";
            body += "| Files processed  | " + files  + " |\n";
            body += "| Bridge branch    | [" + branch + "](" + branchUrl + ") |\n";
            body += "| Full report      | [ATKMA_REPORT.md](" + reportUrl + ") |\n\n";
            body += "ATKMA bridged var and catch(e) incompatibilities for " + target + ".\n";
            body += "Original files preserved. Output files carry .atkma.out.ts suffix.";

            try {
              await github.rest.repos.createCommitComment({
                owner,
                repo,
                commit_sha: sha,
                body,
              });
            } catch(postError) {
              console.log("Could not post: " + postError.message);
            }
